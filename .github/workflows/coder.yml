name: Coder Agent

on:
  issues:
    types: [labeled]
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Issue number to work on'
        required: true
        type: string

permissions:
  contents: write
  issues: write
  pull-requests: write
  actions: write

jobs:
  code:
    # For label events, only fire on 'agent-ready'. For dispatch, always run.
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.label.name == 'agent-ready'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve issue
        id: issue
        run: |
          if [ -n "${{ inputs.issue_number }}" ]; then
            NUM="${{ inputs.issue_number }}"
          else
            NUM="${{ github.event.issue.number }}"
          fi
          echo "NUMBER=$NUM" >> $GITHUB_OUTPUT
          gh issue view "$NUM" --json title,body,author > /tmp/issue.json
          echo "TITLE=$(jq -r '.title' /tmp/issue.json)" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Resolve APP_NAME
        run: |
          APP_NAME=$(gh issue view ${{ steps.issue.outputs.NUMBER }} --json labels -q '.labels[].name' | grep '^project:' | sed 's/project://' | head -1)
          echo "APP_NAME=${APP_NAME:-scaffold}" >> "$GITHUB_ENV"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Install project dependencies
        run: npm ci

      - name: Create feature branch
        id: branch
        run: |
          ISSUE_NUM=${{ steps.issue.outputs.NUMBER }}
          BRANCH="fix/issue-${ISSUE_NUM}"
          git checkout -b "$BRANCH"
          echo "BRANCH=$BRANCH" >> $GITHUB_OUTPUT

      - name: Build coder prompt
        run: |
          ISSUE_NUM=${{ steps.issue.outputs.NUMBER }}
          ISSUE_TITLE=$(jq -r '.title' /tmp/issue.json)
          ISSUE_BODY=$(jq -r '.body' /tmp/issue.json)

          cat > /tmp/coder_prompt.txt << PROMPT
          $(cat CLAUDE.md)

          ---

          $(cat apps/${APP_NAME}/CLAUDE.md)

          ---

          ## Current Project State
          $(cat state/project_state.md)

          ## Feature Status
          $(cat apps/${APP_NAME}/FEATURE_STATUS.md)

          ---

          ## Your Task
          Fix the issue described below. You are the coder agent.

          Issue #${ISSUE_NUM}: ${ISSUE_TITLE}

          Full issue body:
          ${ISSUE_BODY}

          ## Instructions:
          1. Understand the issue from the body above
          2. Find the relevant code in src/ or content/
          3. Implement the fix
          4. Run: npm run build (must succeed before proceeding)
          5. Update apps/${APP_NAME}/FEATURE_STATUS.md:
             - Mark any relevant items as [x] if now fixed
          6. Update state/project_state.md:
             - Record what you did
             - Note: opened PR for issue #${ISSUE_NUM}
          7. Update state/agent_log.md:
             - Append: TIMESTAMP | coder.yml | fix issue #${ISSUE_NUM} | [outcome]
          8. Write .commit-message:
             fix: [brief description of fix] (closes #${ISSUE_NUM})

          ## Constraints:
          - Only modify files relevant to the fix
          - Do NOT modify workflow YAML files
          - Do NOT modify CLAUDE.md files (that's a needs-review change)
          - Build must pass after your changes
          - If you cannot fix it in 3 attempts, write to .fix-failed with reason

          PROMPT

      - name: Run Claude coder agent
        run: |
          claude -p "$(cat /tmp/coder_prompt.txt)" \
            --allowedTools "Bash Read Write Edit Glob Grep" \
            --max-turns 30
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

      - name: Check if fix was attempted or failed
        id: check
        run: |
          if [ -f ".fix-failed" ]; then
            echo "FAILED=true" >> $GITHUB_OUTPUT
            echo "REASON=$(cat .fix-failed)" >> $GITHUB_OUTPUT
          else
            echo "FAILED=false" >> $GITHUB_OUTPUT
          fi

      - name: Handle fix failure
        if: steps.check.outputs.FAILED == 'true'
        run: |
          NUM=${{ steps.issue.outputs.NUMBER }}
          gh issue comment "$NUM" \
            --body "**Coder agent:** Could not automatically fix this issue.

          Reason: ${{ steps.check.outputs.REASON }}

          This issue has been escalated for manual review." \
            --repo ${{ github.repository }}

          gh issue edit "$NUM" \
            --remove-label "agent-ready" \
            --add-label "needs-review" \
            --repo ${{ github.repository }}
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Commit fix
        if: steps.check.outputs.FAILED == 'false'
        run: |
          git config user.name "agentfolio[bot]"
          git config user.email "agentfolio[bot]@users.noreply.github.com"
          git add .
          rm -f .commit-message .fix-failed

          if git diff --staged --quiet; then
            echo "No changes staged — nothing to commit"
            exit 0
          fi

          COMMIT_MSG=$(cat .commit-message 2>/dev/null || \
            echo "fix: address issue #${{ steps.issue.outputs.NUMBER }}")
          git commit -m "$COMMIT_MSG"
          git push origin ${{ steps.branch.outputs.BRANCH }}

      - name: Open pull request
        if: steps.check.outputs.FAILED == 'false'
        id: pr
        run: |
          ISSUE_NUM=${{ steps.issue.outputs.NUMBER }}
          ISSUE_TITLE="${{ steps.issue.outputs.TITLE }}"
          BRANCH="${{ steps.branch.outputs.BRANCH }}"

          CHANGED=$(git diff --name-only origin/main...HEAD)
          echo "Changed files: $CHANGED"

          PR_URL=$(gh pr create \
            --title "fix: ${ISSUE_TITLE} (closes #${ISSUE_NUM})" \
            --body "Fixes #${ISSUE_NUM}

          **Changed files:**
          \`\`\`
          ${CHANGED}
          \`\`\`

          *Opened by agentfolio coder agent*" \
            --head "$BRANCH" \
            --base main \
            --repo ${{ github.repository }})

          PR_NUMBER=$(echo "$PR_URL" | grep -oP '(?<=/pull/)\d+')
          echo "PR_NUMBER=$PR_NUMBER" >> $GITHUB_OUTPUT

          gh issue comment "$ISSUE_NUM" \
            --body "**Coder agent:** Fix implemented. See PR #${PR_NUMBER}." \
            --repo ${{ github.repository }}
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Trigger reviewer
        if: steps.check.outputs.FAILED == 'false' && steps.pr.outputs.PR_NUMBER != ''
        run: |
          echo "Triggering reviewer for PR #${{ steps.pr.outputs.PR_NUMBER }}"
          gh workflow run reviewer.yml -f pr_number="${{ steps.pr.outputs.PR_NUMBER }}"
        env:
          GH_TOKEN: ${{ github.token }}
