name: Reviewer Agent

on:
  pull_request:
    types: [opened, synchronize]
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to review'
        required: true
        type: string

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    # For PR events, only review bot PRs. For dispatch, always run.
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.pull_request.user.login == 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Resolve PR
        id: pr
        run: |
          if [ -n "${{ inputs.pr_number }}" ]; then
            NUM="${{ inputs.pr_number }}"
          else
            NUM="${{ github.event.pull_request.number }}"
          fi
          echo "NUMBER=$NUM" >> $GITHUB_OUTPUT

          # Get PR details
          gh pr view "$NUM" --json headRefOid,headRefName,title --repo ${{ github.repository }} > /tmp/pr.json
          SHA=$(jq -r '.headRefOid' /tmp/pr.json)
          BRANCH=$(jq -r '.headRefName' /tmp/pr.json)
          TITLE=$(jq -r '.title' /tmp/pr.json)
          echo "SHA=$SHA" >> $GITHUB_OUTPUT
          echo "BRANCH=$BRANCH" >> $GITHUB_OUTPUT
          echo "TITLE=$TITLE" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.pr.outputs.SHA }}
          fetch-depth: 0

      - name: Get PR diff
        id: diff
        run: |
          git fetch origin main
          DIFF=$(git diff origin/main...HEAD --name-only)
          echo "CHANGED_FILES<<EOF" >> $GITHUB_OUTPUT
          echo "$DIFF" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Run reviewer with Claude Code Action
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            Read CLAUDE.md and apps/scaffold/CLAUDE.md for the auto-merge rules.

            You are the reviewer agent. Review this PR from the coder agent.

            PR #${{ steps.pr.outputs.NUMBER }}
            Title: ${{ steps.pr.outputs.TITLE }}
            Branch: ${{ steps.pr.outputs.BRANCH }}

            Changed files:
            ${{ steps.diff.outputs.CHANGED_FILES }}

            ## Review checklist:

            AUTO-MERGE safe if ALL of these are true:
            - [ ] No CLAUDE.md files modified
            - [ ] No .yml workflow files modified
            - [ ] No auth/config files modified
            - [ ] No schema files modified
            - [ ] Changes are limited to: src/ content/ state/ public/
            - [ ] Build would pass (check for obvious syntax errors)

            NEEDS-REVIEW if ANY of these are true:
            - CLAUDE.md was modified
            - Workflow files were modified
            - New pages or major layout changes
            - Any file not in the safe list above

            ## Your actions:

            1. Review the changed files list above
            2. Apply the checklist
            3. Execute one of:

            If AUTO-MERGE safe:
              gh pr review ${{ steps.pr.outputs.NUMBER }} \
                --approve \
                --body "**Reviewer agent:** Changes look safe. Enabling auto-merge." \
                --repo ${{ github.repository }}
              gh pr merge ${{ steps.pr.outputs.NUMBER }} \
                --auto --squash \
                --repo ${{ github.repository }}

            If NEEDS-REVIEW:
              gh pr review ${{ steps.pr.outputs.NUMBER }} \
                --request-changes \
                --body "**Reviewer agent:** This PR requires human review because: [reason].
                Changes affecting [list files] need manual approval." \
                --repo ${{ github.repository }}
              gh pr edit ${{ steps.pr.outputs.NUMBER }} \
                --add-label "needs-review" \
                --repo ${{ github.repository }}

            4. Do nothing else. Classification and labeling only.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
