name: Reviewer Agent

on:
  pull_request:
    types: [opened, synchronize]
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to review'
        required: true
        type: string

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    # For PR events, only review bot PRs. For dispatch, always run.
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.pull_request.user.login == 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Resolve PR
        id: pr
        run: |
          if [ -n "${{ inputs.pr_number }}" ]; then
            NUM="${{ inputs.pr_number }}"
          else
            NUM="${{ github.event.pull_request.number }}"
          fi
          echo "NUMBER=$NUM" >> $GITHUB_OUTPUT

          gh pr view "$NUM" --json headRefOid,headRefName,title --repo ${{ github.repository }} > /tmp/pr.json
          SHA=$(jq -r '.headRefOid' /tmp/pr.json)
          BRANCH=$(jq -r '.headRefName' /tmp/pr.json)
          TITLE=$(jq -r '.title' /tmp/pr.json)
          echo "SHA=$SHA" >> $GITHUB_OUTPUT
          echo "BRANCH=$BRANCH" >> $GITHUB_OUTPUT
          echo "TITLE=$TITLE" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.pr.outputs.SHA }}
          fetch-depth: 0

      - name: Get PR diff
        id: diff
        run: |
          git fetch origin main
          DIFF=$(git diff origin/main...HEAD --name-only)
          echo "CHANGED_FILES<<EOF" >> $GITHUB_OUTPUT
          echo "$DIFF" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Build review prompt
        run: |
          NUM=${{ steps.pr.outputs.NUMBER }}
          TITLE="${{ steps.pr.outputs.TITLE }}"
          BRANCH="${{ steps.pr.outputs.BRANCH }}"
          CHANGED="${{ steps.diff.outputs.CHANGED_FILES }}"

          cat > /tmp/review_prompt.txt << PROMPT
          Read CLAUDE.md and apps/scaffold/CLAUDE.md for the auto-merge rules.

          You are the reviewer agent. Review this PR from the coder agent.

          PR #${NUM}
          Title: ${TITLE}
          Branch: ${BRANCH}

          Changed files:
          ${CHANGED}

          ## Review checklist:

          AUTO-MERGE safe if ALL of these are true:
          - No CLAUDE.md files modified
          - No .yml workflow files modified
          - No auth/config files modified
          - No schema files modified
          - Changes are limited to: src/ content/ state/ public/ skills/ apps/
          - Build would pass (check for obvious syntax errors)

          NEEDS-REVIEW if ANY of these are true:
          - CLAUDE.md was modified
          - Workflow files were modified
          - New pages or major layout changes
          - Any file not in the safe list above

          ## Your actions:

          1. Review the changed files list above
          2. Apply the checklist
          3. Execute one of:

          If AUTO-MERGE safe:
            gh pr review ${NUM} --approve --body "**Reviewer agent:** Changes look safe. Enabling auto-merge." --repo ${{ github.repository }}
            gh pr merge ${NUM} --auto --squash --repo ${{ github.repository }}

          If NEEDS-REVIEW:
            gh pr review ${NUM} --request-changes --body "**Reviewer agent:** This PR requires human review because: [reason]. Changes affecting [list files] need manual approval." --repo ${{ github.repository }}
            gh pr edit ${NUM} --add-label "needs-review" --repo ${{ github.repository }}

          4. Do nothing else. Classification and labeling only.
          PROMPT

      - name: Run reviewer
        run: |
          claude -p "$(cat /tmp/review_prompt.txt)" \
            --allowedTools "Bash(gh:*) Read Glob Grep" \
            --max-turns 10
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          GITHUB_TOKEN: ${{ github.token }}
