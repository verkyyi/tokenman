name: Reviewer Agent

on:
  pull_request:
    types: [opened, synchronize]
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to review'
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  review:
    # For PR events, only review bot PRs. For dispatch, always run.
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.pull_request.user.login == 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Resolve PR
        id: pr
        run: |
          if [ -n "${{ inputs.pr_number }}" ]; then
            NUM="${{ inputs.pr_number }}"
          else
            NUM="${{ github.event.pull_request.number }}"
          fi
          echo "NUMBER=$NUM" >> $GITHUB_OUTPUT

          gh pr view "$NUM" --json headRefOid,headRefName,title --repo ${{ github.repository }} > /tmp/pr.json
          SHA=$(jq -r '.headRefOid' /tmp/pr.json)
          BRANCH=$(jq -r '.headRefName' /tmp/pr.json)
          TITLE=$(jq -r '.title' /tmp/pr.json)
          echo "SHA=$SHA" >> $GITHUB_OUTPUT
          echo "BRANCH=$BRANCH" >> $GITHUB_OUTPUT
          echo "TITLE=$TITLE" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.pr.outputs.SHA }}
          fetch-depth: 0

      - name: Check onboarding complete
        run: |
          if [ ! -f state/evolve_config.md ]; then
            echo "::warning::Onboarding not complete. Run: claude 'Set up tokenman. Follow https://github.com/verkyyi/tokenman/blob/main/docs/onboarding.md'"
            exit 0
          fi

      - name: Get PR diff
        id: diff
        run: |
          git fetch origin main
          DIFF=$(git diff origin/main...HEAD --name-only)
          echo "CHANGED_FILES<<EOF" >> $GITHUB_OUTPUT
          echo "$DIFF" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Install project dependencies
        run: |
          INSTALL_CMD=$(grep '^install:' state/evolve_config.md | cut -d: -f2- | xargs)
          if [ -n "$INSTALL_CMD" ]; then
            eval "$INSTALL_CMD"
          fi

      - name: Build review prompt
        run: |
          NUM=${{ steps.pr.outputs.NUMBER }}
          TITLE="${{ steps.pr.outputs.TITLE }}"
          BRANCH="${{ steps.pr.outputs.BRANCH }}"
          CHANGED="${{ steps.diff.outputs.CHANGED_FILES }}"

          cat > /tmp/review_prompt.txt << PROMPT
          You are the reviewer agent for Tokenman. Your job is to review PRs
          and decide: merge or block. You should be BOLD — approve and merge
          most changes. The system is designed to self-heal, so a bad merge
          gets caught and fixed by the next evolve cycle.

          PR #${NUM}
          Title: ${TITLE}
          Branch: ${BRANCH}

          Changed files:
          ${CHANGED}

          $(./scripts/build-preamble.sh 2)

          ## Review process:

          1. Read the actual changed files (use Read tool on each file)
          2. Run the test command from the Evolve Config Build section — if it passes, that's a strong signal
          3. Check the diff: git diff origin/main...HEAD
          4. Run Issue Requirement Verification (see below)
          5. Apply the decision framework below

          ## Issue Requirement Verification:

          Before making your verdict, verify that the PR addresses the requirements
          from the linked issue:

          1. Extract the linked issue number:
             - First try: gh pr view ${NUM} --json closingIssuesReferences --jq '.closingIssuesReferences[].number' --repo ${{ github.repository }}
             - Fallback: parse the PR title and body for "closes #N", "fixes #N", or "resolves #N"
             - If no linked issue is found, skip this section

          2. Read the issue body: gh issue view <ISSUE_NUMBER> --repo ${{ github.repository }}

          3. Extract actionable requirements from the issue body:
             - Checkbox items (- [ ] ...)
             - Numbered steps or acceptance criteria
             - Imperative statements ("must", "should", "add", "remove", "fix")

          4. Cross-reference each requirement against the PR diff and changed files

          5. Output a structured checklist in your review comment:
             - [DONE] Requirement fully addressed by the PR
             - [PARTIAL] Requirement partially addressed — note what is missing
             - [NOT DONE] Requirement not addressed by the PR

          **Important:** This checklist is INFORMATIONAL ONLY. It does not override
          the HARD BLOCK / APPROVE decision framework. A PR with [NOT DONE] items
          can still be approved if there are no hard blocks. Include the checklist
          in your gh pr review --body comment for visibility.

          ## Decision framework (BLACKLIST — block only these, approve everything else):

          HARD BLOCK (only these warrant blocking):
          - Secrets, tokens, API keys, or credentials visible in code
          - Deleting CLAUDE.md, package.json, or workflow files without replacement
          - Build fails
          - Infinite loop risk (e.g., workflow triggering itself endlessly)

          APPROVE AND MERGE — everything else, including:
          - Source code, content, styling, config
          - Workflow YAML changes (self-modification is allowed and expected)
          - New or modified skill files
          - CLAUDE.md changes (the system evolves its own rules)
          - New files, new pages, layout changes
          - Package.json / dependency changes (if build passes)

          ## Your actions:

          If APPROVE (build passes, no hard blocks):
            gh pr review ${NUM} --approve --body "**Reviewer agent:** ✅ Reviewed and approved. Build passes, no hard blocks found." --repo ${{ github.repository }}
            gh pr merge ${NUM} --squash --repo ${{ github.repository }}

          If HARD BLOCK:
            gh pr review ${NUM} --request-changes --body "**Reviewer agent:** ❌ Blocked: [specific reason]. This requires human review." --repo ${{ github.repository }}
            gh pr edit ${NUM} --add-label "needs-review" --repo ${{ github.repository }}

          NEVER run `gh pr close` or close a PR for any reason. You may only
          approve+merge or request changes. Even if a PR appears redundant or
          already landed, do NOT close it — leave that decision to humans.

          When in doubt, APPROVE. The system self-heals.

          PROMPT

      - name: Git identity
        run: |
          git config user.name "tokenman"
          git config user.email "tokenman@users.noreply.github.com"

      - name: Detect change tier
        id: tier
        run: |
          CHANGED="${{ steps.diff.outputs.CHANGED_FILES }}"
          # Tier 0: only state/ files changed
          NON_STATE=$(echo "$CHANGED" | grep -v '^state/' | head -1 || true)
          if [ -z "$NON_STATE" ]; then
            echo "TIER=0" >> $GITHUB_OUTPUT
            echo "Change tier: 0 (state-only)"
          else
            echo "TIER=1" >> $GITHUB_OUTPUT
            echo "Change tier: 1+ (non-state files changed)"
          fi

      - name: Run reviewer
        id: primary_review
        run: |
          claude -p "$(cat /tmp/review_prompt.txt)" \
            --model opus \
            --effort max \
            --max-turns 30 \
            --fallback-model sonnet \
            --permission-mode bypassPermissions \
            --output-format json \
            > /tmp/claude_output.json

          # Extract primary verdict from PR state after review
          NUM=${{ steps.pr.outputs.NUMBER }}
          REVIEWS=$(gh pr view "$NUM" --json reviews --jq '.reviews[-1].state' --repo ${{ github.repository }} 2>/dev/null || echo "UNKNOWN")
          if echo "$REVIEWS" | grep -qi "APPROVED"; then
            echo "VERDICT=APPROVE" >> $GITHUB_OUTPUT
          else
            echo "VERDICT=BLOCK" >> $GITHUB_OUTPUT
          fi
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          GITHUB_TOKEN: ${{ github.token }}

      - name: Safety net — reopen PR if reviewer incorrectly closed it
        if: always()
        run: |
          NUM=${{ steps.pr.outputs.NUMBER }}
          STATE=$(gh pr view "$NUM" --json state --jq '.state' --repo ${{ github.repository }} 2>/dev/null || echo "UNKNOWN")
          if [ "$STATE" = "CLOSED" ]; then
            echo "WARNING: PR #$NUM was CLOSED (not merged) — reopening"
            gh pr reopen "$NUM" --repo ${{ github.repository }}
            gh pr comment "$NUM" --body "**Safety net:** PR was incorrectly closed by the reviewer agent. Reopened automatically. See issue #90." --repo ${{ github.repository }}
          else
            echo "PR #$NUM state is $STATE — no recovery needed"
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Outside voice — secondary model review
        if: steps.tier.outputs.TIER != '0'
        id: outside_voice
        run: |
          NUM=${{ steps.pr.outputs.NUMBER }}
          TITLE="${{ steps.pr.outputs.TITLE }}"
          CHANGED="${{ steps.diff.outputs.CHANGED_FILES }}"

          DIFF_CONTENT=$(git diff origin/main...HEAD 2>/dev/null | head -3000)

          cat > /tmp/outside_voice_prompt.txt << 'OVEOF'
          You are a secondary reviewer providing an independent "outside voice" check.
          You have NOT seen the primary reviewer's verdict — your assessment is independent.

          Review the PR diff and changed files below. Focus on what a primary reviewer
          might miss:
          - Security issues (secrets, injection, auth bypass)
          - Infinite loop or self-triggering workflow risks
          - Build-breaking changes
          - Subtle regressions or unintended side effects

          Do NOT do a full re-review. Focus on gaps and blind spots.
          Output ONLY a JSON object on the last line:
          {"verdict": "APPROVE" | "CONCERN", "concerns": ["...", ...]}
          If APPROVE with no concerns: {"verdict": "APPROVE", "concerns": []}
          OVEOF

          cat >> /tmp/outside_voice_prompt.txt << CTXEOF

          PR #${NUM}: ${TITLE}
          Changed files: ${CHANGED}

          Diff (truncated to 3000 lines):
          ${DIFF_CONTENT}
          CTXEOF

          claude -p "$(cat /tmp/outside_voice_prompt.txt)" \
            --model sonnet \
            --effort high \
            --max-turns 10 \
            --fallback-model haiku \
            --permission-mode bypassPermissions \
            --output-format text \
            > /tmp/outside_voice_output.txt 2>/dev/null || true

          # Parse the secondary verdict
          if [ -f /tmp/outside_voice_output.txt ]; then
            # Extract last JSON line from output
            SECONDARY_JSON=$(grep -o '{"verdict":[^}]*}' /tmp/outside_voice_output.txt | tail -1 || echo '{}')
            SECONDARY_VERDICT=$(echo "$SECONDARY_JSON" | jq -r '.verdict // "UNKNOWN"' 2>/dev/null || echo "UNKNOWN")
            CONCERNS=$(echo "$SECONDARY_JSON" | jq -r '.concerns // [] | join("; ")' 2>/dev/null || echo "")
          else
            SECONDARY_VERDICT="UNKNOWN"
            CONCERNS=""
          fi

          echo "VERDICT=$SECONDARY_VERDICT" >> $GITHUB_OUTPUT
          echo "CONCERNS=$CONCERNS" >> $GITHUB_OUTPUT
          echo "Secondary verdict: $SECONDARY_VERDICT"
          if [ -n "$CONCERNS" ]; then
            echo "Concerns: $CONCERNS"
          fi
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          GITHUB_TOKEN: ${{ github.token }}

      - name: Post tensions as PR comments
        if: steps.tier.outputs.TIER != '0' && steps.outside_voice.outputs.VERDICT == 'CONCERN' && steps.primary_review.outputs.VERDICT == 'APPROVE'
        run: |
          NUM=${{ steps.pr.outputs.NUMBER }}
          CONCERNS="${{ steps.outside_voice.outputs.CONCERNS }}"
          if [ -n "$CONCERNS" ]; then
            BODY="[Outside Voice] Secondary model (Sonnet) flagged concerns while primary (Opus) approved:\n\n${CONCERNS}\n\nThis tension is logged for review. The primary verdict stands unless a human intervenes."
            gh pr comment "$NUM" --body "$BODY" --repo ${{ github.repository }} || true
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Persist review log
        if: always()
        run: |
          TIMESTAMP=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          NUM=${{ steps.pr.outputs.NUMBER }}
          PRIMARY="${{ steps.primary_review.outputs.VERDICT }}"
          TIER="${{ steps.tier.outputs.TIER }}"

          if [ "$TIER" = "0" ]; then
            SECONDARY="SKIPPED"
            TENSIONS="0"
          else
            SECONDARY="${{ steps.outside_voice.outputs.VERDICT }}"
            SECONDARY="${SECONDARY:-UNKNOWN}"
            if [ "$PRIMARY" = "APPROVE" ] && [ "$SECONDARY" = "CONCERN" ]; then
              TENSIONS="1"
            elif [ "$PRIMARY" = "BLOCK" ] && [ "$SECONDARY" = "APPROVE" ]; then
              TENSIONS="1"
            else
              TENSIONS="0"
            fi
          fi

          # Determine final action
          STATE=$(gh pr view "$NUM" --json state --jq '.state' --repo ${{ github.repository }} 2>/dev/null || echo "UNKNOWN")
          if [ "$STATE" = "MERGED" ]; then
            ACTION="MERGED"
          elif [ "$PRIMARY" = "BLOCK" ]; then
            ACTION="BLOCKED"
          elif [ "$TENSIONS" = "1" ]; then
            ACTION="COMMENTED"
          else
            ACTION="MERGED"
          fi

          mkdir -p state
          if [ ! -f state/review_log.md ]; then
            printf '# Review Log\n# Format: TIMESTAMP | PR#NUM | primary:VERDICT | secondary:VERDICT | tensions:COUNT | action:RESULT\n' > state/review_log.md
          fi
          echo "${TIMESTAMP} | PR#${NUM} | primary:${PRIMARY} | secondary:${SECONDARY} | tensions:${TENSIONS} | action:${ACTION}" >> state/review_log.md
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Close linked issues if PR was merged
        if: always()
        run: |
          NUM=${{ steps.pr.outputs.NUMBER }}
          STATE=$(gh pr view "$NUM" --json state --jq '.state' --repo ${{ github.repository }})
          if [ "$STATE" = "MERGED" ]; then
            # Primary: use closingIssuesReferences API
            ISSUES=$(gh pr view "$NUM" --json closingIssuesReferences --jq '.closingIssuesReferences[].number' --repo ${{ github.repository }} 2>/dev/null || echo "")

            # Fallback: parse PR title and body for close/fix keywords and metadata
            if [ -z "$(echo "$ISSUES" | xargs)" ]; then
              echo "closingIssuesReferences returned empty — falling back to title/body parsing"
              PR_DATA=$(gh pr view "$NUM" --json title,body --repo ${{ github.repository }})
              PR_TITLE=$(echo "$PR_DATA" | jq -r '.title')
              PR_BODY=$(echo "$PR_DATA" | jq -r '.body')
              PR_TEXT="${PR_TITLE} ${PR_BODY}"

              # Extract from structured metadata: <!-- linked-issue: N -->
              META_ISSUES=$(echo "$PR_BODY" | grep -oE 'linked-issue: [0-9]+' | grep -oE '[0-9]+' || true)

              # Extract from keywords: closes #N, fixes #N, resolves #N
              KEYWORD_ISSUES=$(echo "$PR_TEXT" | grep -oiE '(closes|fixes|resolves) #[0-9]+' | grep -oE '[0-9]+' || true)

              ISSUES=$(printf '%s\n%s' "$META_ISSUES" "$KEYWORD_ISSUES" | sort -un | grep -v '^$' || true)
            fi

            if [ -z "$(echo "$ISSUES" | xargs)" ]; then
              echo "No linked issues found for PR #$NUM"
            else
              for ISSUE in $ISSUES; do
                echo "Closing issue #$ISSUE (linked to merged PR #$NUM)"
                gh issue close "$ISSUE" --comment "Closed by merge of PR #$NUM." --repo ${{ github.repository }} || true
              done
            fi
          else
            echo "PR #$NUM not merged — skipping issue close"
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Log usage metrics
        if: always()
        run: |
          TIMESTAMP=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          if [ -f /tmp/claude_output.json ]; then
            MODEL=$(jq -r '(.modelUsage // {} | keys | .[0]) // "unknown"' /tmp/claude_output.json 2>/dev/null || echo "unknown")
            INPUT=$(jq -r '((.usage.input_tokens // 0) + (.usage.cache_creation_input_tokens // 0) + (.usage.cache_read_input_tokens // 0)) | tostring' /tmp/claude_output.json 2>/dev/null || echo "unknown")
            OUTPUT=$(jq -r '(.usage.output_tokens // 0) | tostring' /tmp/claude_output.json 2>/dev/null || echo "unknown")
            TURNS=$(jq -r '(.num_turns // 0) | tostring' /tmp/claude_output.json 2>/dev/null || echo "unknown")
            COST=$(jq -r '(.total_cost_usd // 0) | tostring' /tmp/claude_output.json 2>/dev/null || echo "unknown")
          else
            MODEL="unknown"; INPUT="unknown"; OUTPUT="unknown"; TURNS="unknown"; COST="unknown"
          fi
          mkdir -p state
          if [ ! -f state/usage_log.md ]; then
            printf '# Usage Log\n' > state/usage_log.md
          fi
          echo "${TIMESTAMP} | reviewer | model:${MODEL} | in:${INPUT} | out:${OUTPUT} | turns:${TURNS} | cost:${COST}" >> state/usage_log.md
          CUTOFF=$(date -u -d '7 days ago' +%Y-%m-%dT)
          awk -v c="$CUTOFF" 'NR==1{print;next} $0>=c' state/usage_log.md > /tmp/usage_trimmed.md && mv /tmp/usage_trimmed.md state/usage_log.md

      - name: Commit state changes via API
        if: always()
        run: |
          for f in $(git diff --name-only state/ 2>/dev/null); do
            ./scripts/commit-state.sh "$f" "state: reviewer usage metrics"
          done
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Sync README after merge
        if: always()
        run: |
          NUM=${{ steps.pr.outputs.NUMBER }}
          STATE=$(gh pr view "$NUM" --json state --jq '.state' --repo ${{ github.repository }} 2>/dev/null || echo "UNKNOWN")
          if [ "$STATE" != "MERGED" ]; then
            echo "PR not merged — skipping README sync"
            exit 0
          fi

          # Only sync if structural files changed
          CHANGED=$(gh pr view "$NUM" --json files --jq '.files[].path' --repo ${{ github.repository }})
          if ! echo "$CHANGED" | grep -qE '^\.github/workflows/|^skills/|^apps/'; then
            echo "No structural files changed — skipping README sync"
            exit 0
          fi

          echo "Structural files changed in merged PR — syncing README"
          git checkout -- . || true
          git fetch origin main
          git checkout -B main origin/main

          # Count actual workflow files
          ACTUAL_COUNT=$(ls -1 .github/workflows/*.yml 2>/dev/null | wc -l)

          # Number-to-word mapping
          declare -A WORDS
          WORDS=([1]="one" [2]="two" [3]="three" [4]="four" [5]="five" [6]="six" [7]="seven" [8]="eight" [9]="nine" [10]="ten" [11]="eleven" [12]="twelve" [13]="thirteen" [14]="fourteen" [15]="fifteen")
          COUNT_WORD="${WORDS[$ACTUAL_COUNT]:-$ACTUAL_COUNT}"

          # Update heading: "## The X workflows"
          sed -i "s/## The [a-z]* workflows/## The ${COUNT_WORD} workflows/" README.md

          # Update architecture comment: "The X autonomous workflows"
          sed -i "s/The [a-z]* autonomous workflows/The ${COUNT_WORD} autonomous workflows/" README.md

          # Add missing workflows to table
          LAST_TABLE_LINE=$(grep -n '^| `.*\.yml`' README.md | tail -1 | cut -d: -f1)
          for YML in .github/workflows/*.yml; do
            BASENAME=$(basename "$YML")
            if ! grep -q "^| \`${BASENAME}\`" README.md; then
              WF_NAME=$(grep '^name:' "$YML" | head -1 | sed 's/name: *//')
              TRIGGER="Dispatched"
              grep -q 'workflow_dispatch:' "$YML" && TRIGGER="Manual dispatch"
              grep -q 'schedule:' "$YML" && TRIGGER="Scheduled"
              grep -q 'push:' "$YML" && TRIGGER="Push to main"
              grep -q 'pull_request:' "$YML" && TRIGGER="PR event"
              grep -q 'issues:' "$YML" && TRIGGER="Issue event"
              sed -i "${LAST_TABLE_LINE}a\\| \`${BASENAME}\` | ${TRIGGER} | ${WF_NAME} |" README.md
              LAST_TABLE_LINE=$((LAST_TABLE_LINE + 1))
              echo "Added ${BASENAME} to README table"
            fi
          done

          # Remove table rows for deleted workflows
          grep -E '^\| `[^`]+\.yml`' README.md | sed -E 's/^\| `([^`]+\.yml)`.*/\1/' | while read -r WF; do
            if [ ! -f ".github/workflows/$WF" ]; then
              sed -i "/^| \`$(echo "$WF" | sed 's/\./\\./g')\`/d" README.md
              echo "Removed ${WF} from README table (file deleted)"
            fi
          done

          # Only commit if README actually changed
          if git diff --quiet README.md; then
            echo "README already up to date"
          else
            git add README.md
            git commit -m "state: sync README workflow count and table"
            git push origin main || true
          fi
        env:
          GH_TOKEN: ${{ github.token }}
