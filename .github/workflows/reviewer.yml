name: Reviewer Agent

on:
  pull_request:
    types: [opened, synchronize]
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to review'
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  review:
    # For PR events, only review bot PRs. For dispatch, always run.
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.pull_request.user.login == 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Resolve PR
        id: pr
        run: |
          if [ -n "${{ inputs.pr_number }}" ]; then
            NUM="${{ inputs.pr_number }}"
          else
            NUM="${{ github.event.pull_request.number }}"
          fi
          echo "NUMBER=$NUM" >> $GITHUB_OUTPUT

          gh pr view "$NUM" --json headRefOid,headRefName,title --repo ${{ github.repository }} > /tmp/pr.json
          SHA=$(jq -r '.headRefOid' /tmp/pr.json)
          BRANCH=$(jq -r '.headRefName' /tmp/pr.json)
          TITLE=$(jq -r '.title' /tmp/pr.json)
          echo "SHA=$SHA" >> $GITHUB_OUTPUT
          echo "BRANCH=$BRANCH" >> $GITHUB_OUTPUT
          echo "TITLE=$TITLE" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.pr.outputs.SHA }}
          fetch-depth: 0

      - name: Get PR diff
        id: diff
        run: |
          git fetch origin main
          DIFF=$(git diff origin/main...HEAD --name-only)
          echo "CHANGED_FILES<<EOF" >> $GITHUB_OUTPUT
          echo "$DIFF" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Claude Code and dependencies
        run: |
          npm install -g @anthropic-ai/claude-code
          npm ci

      - name: Build review prompt
        run: |
          NUM=${{ steps.pr.outputs.NUMBER }}
          TITLE="${{ steps.pr.outputs.TITLE }}"
          BRANCH="${{ steps.pr.outputs.BRANCH }}"
          CHANGED="${{ steps.diff.outputs.CHANGED_FILES }}"

          LEARNED_RULES=$(cat state/learned_rules.md)

          cat > /tmp/review_prompt.txt << PROMPT
          You are the reviewer agent for Agentfolio. Your job is to review PRs
          and decide: merge or block. You should be BOLD — approve and merge
          most changes. The system is designed to self-heal, so a bad merge
          gets caught and fixed by the next evolve cycle.

          PR #${NUM}
          Title: ${TITLE}
          Branch: ${BRANCH}

          Changed files:
          ${CHANGED}

          ## Review process:

          1. Read the actual changed files (use Read tool on each file)
          2. Run: npm run build — if it passes, that's a strong signal
          3. Check the diff: git diff origin/main...HEAD
          4. Apply the decision framework below

          ## Decision framework (BLACKLIST — block only these, approve everything else):

          HARD BLOCK (only these warrant blocking):
          - Secrets, tokens, API keys, or credentials visible in code
          - Deleting CLAUDE.md, package.json, or workflow files without replacement
          - Build fails
          - Infinite loop risk (e.g., workflow triggering itself endlessly)

          APPROVE AND MERGE — everything else, including:
          - Source code, content, styling, config
          - Workflow YAML changes (self-modification is allowed and expected)
          - New or modified skill files
          - CLAUDE.md changes (the system evolves its own rules)
          - New files, new pages, layout changes
          - Package.json / dependency changes (if build passes)

          ## Your actions:

          If APPROVE (build passes, no hard blocks):
            gh pr review ${NUM} --approve --body "**Reviewer agent:** ✅ Reviewed and approved. Build passes, no hard blocks found." --repo ${{ github.repository }}
            gh pr merge ${NUM} --squash --repo ${{ github.repository }}

          If HARD BLOCK:
            gh pr review ${NUM} --request-changes --body "**Reviewer agent:** ❌ Blocked: [specific reason]. This requires human review." --repo ${{ github.repository }}
            gh pr edit ${NUM} --add-label "needs-review" --repo ${{ github.repository }}

          When in doubt, APPROVE. The system self-heals.

          ## Learned Rules (from human feedback — MUST follow these)
          ${LEARNED_RULES}
          PROMPT

      - name: Run reviewer
        run: |
          claude -p "$(cat /tmp/review_prompt.txt)" \
            --allowedTools "Bash(npm:*) Bash(gh:*) Bash(git:*) Read Glob Grep" \
            --max-turns 15
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          GITHUB_TOKEN: ${{ github.token }}
