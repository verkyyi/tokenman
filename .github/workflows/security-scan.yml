name: Security Scan

on:
  pull_request:
    paths:
      - '.github/workflows/**'
      - 'scripts/**'

permissions:
  contents: read

jobs:
  actionlint:
    # Replaced runner-guard (Vigilant-LLC/runner-guard) due to upstream
    # checksum verification failure in v2.5.2 — no fix available (#137).
    # actionlint provides workflow security linting (expression injection,
    # untrusted input, etc.) as a well-maintained replacement (4.9K+ stars).
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install actionlint
        run: bash <(curl -s https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash)
        shell: bash

      - name: Run actionlint
        run: ./actionlint -color

  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run ShellCheck
        run: shellcheck scripts/*.sh
