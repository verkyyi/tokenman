name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'content/**'
      - 'public/**'
      - 'state/**'
      - 'skills/**'
      - 'astro.config.*'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig.json'
      - 'tests/**'
      - 'playwright.config.*'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check onboarding complete
        run: |
          if [ ! -f state/evolve_config.md ]; then
            echo "::warning::Onboarding not complete. Run: claude 'Set up tokenman. Follow https://github.com/verkyyi/tokenman/blob/main/docs/onboarding.md'"
            exit 0
          fi

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install project dependencies
        run: |
          INSTALL_CMD=$(grep '^install:' state/evolve_config.md | cut -d: -f2- | xargs)
          if [ -n "$INSTALL_CMD" ]; then
            eval "$INSTALL_CMD"
          fi

      - name: Build
        run: |
          BUILD_CMD=$(grep '^build:' state/evolve_config.md | cut -d: -f2- | xargs)
          if [ -n "$BUILD_CMD" ] && [ "$BUILD_CMD" != "(none)" ]; then
            eval "$BUILD_CMD"
          fi
        env:
          SITE_URL: https://tokenman.io
          BASE_PATH: /

      - name: Run E2E tests (if configured)
        run: |
          E2E_SETUP=$(grep '^e2e-setup:' state/evolve_config.md | cut -d: -f2- | xargs)
          E2E_CMD=$(grep '^e2e:' state/evolve_config.md | cut -d: -f2- | xargs)
          if [ -z "$E2E_CMD" ] || [ "$E2E_CMD" = "(none)" ]; then
            echo "No e2e command configured — skipping"
            exit 0
          fi
          if [ -n "$E2E_SETUP" ] && [ "$E2E_SETUP" != "(none)" ]; then
            echo "Running E2E setup: $E2E_SETUP"
            eval "$E2E_SETUP"
          fi
          echo "Running E2E tests: $E2E_CMD"
          eval "$E2E_CMD"

      # Regenerate sitemap if not already in dist
      - name: Verify sitemap
        run: |
          if [ -f "dist/sitemap-index.xml" ]; then
            echo "Sitemap generated by Astro integration"
          else
            echo "Warning: sitemap not found in dist/"
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
