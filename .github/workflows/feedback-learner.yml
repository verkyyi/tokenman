name: Feedback Learner

on:
  issue_comment:
    types: [created]
  pull_request_review:
    types: [submitted]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [closed]

permissions:
  contents: write
  issues: read
  pull-requests: read

concurrency:
  group: feedback-learner
  cancel-in-progress: false

jobs:
  learn:
    # Only learn from human feedback, not bot comments
    if: >
      github.event.sender.login != 'github-actions[bot]' &&
      github.event.sender.type == 'User'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Collect feedback context
        id: context
        run: |
          EVENT="${{ github.event_name }}"
          echo "EVENT=$EVENT" >> $GITHUB_OUTPUT

          if [ "$EVENT" = "issue_comment" ]; then
            BODY="${{ github.event.comment.body }}"
            SOURCE="issue #${{ github.event.issue.number }}: ${{ github.event.issue.title }}"
            AUTHOR="${{ github.event.comment.user.login }}"
          elif [ "$EVENT" = "pull_request_review" ]; then
            BODY="${{ github.event.review.body }}"
            SOURCE="PR #${{ github.event.pull_request.number }}: ${{ github.event.pull_request.title }}"
            AUTHOR="${{ github.event.review.user.login }}"
            STATE="${{ github.event.review.state }}"
            echo "REVIEW_STATE=$STATE" >> $GITHUB_OUTPUT
          elif [ "$EVENT" = "pull_request_review_comment" ]; then
            BODY="${{ github.event.comment.body }}"
            SOURCE="PR #${{ github.event.pull_request.number }}: ${{ github.event.pull_request.title }}"
            AUTHOR="${{ github.event.comment.user.login }}"
          elif [ "$EVENT" = "issues" ]; then
            BODY="Issue closed as ${{ github.event.issue.state_reason }}"
            SOURCE="issue #${{ github.event.issue.number }}: ${{ github.event.issue.title }}"
            AUTHOR="${{ github.event.sender.login }}"
            LABELS=$(gh issue view ${{ github.event.issue.number }} --json labels -q '[.labels[].name] | join(",")')
            echo "LABELS=$LABELS" >> $GITHUB_OUTPUT
          fi

          echo "AUTHOR=$AUTHOR" >> $GITHUB_OUTPUT
          echo "SOURCE=$SOURCE" >> $GITHUB_OUTPUT

          # Write body to file to handle multiline/special chars
          echo "$BODY" > /tmp/feedback_body.txt
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Extract lesson
        run: |
          EVENT="${{ steps.context.outputs.EVENT }}"
          SOURCE="${{ steps.context.outputs.SOURCE }}"
          AUTHOR="${{ steps.context.outputs.AUTHOR }}"
          REVIEW_STATE="${{ steps.context.outputs.REVIEW_STATE }}"
          LABELS="${{ steps.context.outputs.LABELS }}"
          FEEDBACK=$(cat /tmp/feedback_body.txt)
          CURRENT_RULES=$(cat state/learned_rules.md)
          TODAY=$(date -u +%Y-%m-%d)

          cat > /tmp/learner_prompt.txt << PROMPT
          You are the feedback learner. Your job is to extract lasting lessons
          from human feedback and add them to the system's learned rules.

          ## Feedback received:

          Event: ${EVENT}
          Source: ${SOURCE}
          Author: ${AUTHOR}
          Review state: ${REVIEW_STATE}
          Labels: ${LABELS}

          Feedback content:
          ${FEEDBACK}

          ## Current learned rules:
          ${CURRENT_RULES}

          ## Your task:

          1. Analyze the feedback. Determine if it contains a LASTING LESSON
             that should change how agents behave in the future.

          2. A lasting lesson is:
             - A correction: "don't do X" or "always do Y"
             - A preference: "I prefer X over Y"
             - A quality standard: "check X before merging"
             - A rejection pattern: issue closed as "not planned" = "don't create issues like this"
             - A PR rejection with specific reasoning

          3. NOT a lasting lesson (skip these):
             - One-time instructions ("fix this typo")
             - Acknowledgments ("thanks", "looks good", "LGTM")
             - Questions without implied preference
             - Bot-generated comments
             - Approvals without additional context

          4. If there IS a lasting lesson:
             - Check if a similar rule already exists in the current rules
             - If yes: update the existing rule (make it more precise or broader)
             - If no: append a new rule

             Format for new rules:
             ## [CATEGORY] Brief rule title
             **Date:** ${TODAY} | **Source:** ${SOURCE}

             [The rule in clear, actionable language. One or two sentences max.]

             Categories: QUALITY, STYLE, ARCHITECTURE, PROCESS, CONTENT, AVOID

          5. If there is NO lasting lesson: do nothing. Do not write to any file.
             Write "NO_LESSON" to .learner-result

          6. If you DO write a lesson: write "LESSON_ADDED" to .learner-result

          IMPORTANT: Only append to state/learned_rules.md. Never delete existing rules.
          PROMPT

          claude -p "$(cat /tmp/learner_prompt.txt)" \
            --allowedTools "Read Write Edit" \
            --max-turns 10
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

      - name: Commit if rules changed
        run: |
          if [ -f .learner-result ] && grep -q "LESSON_ADDED" .learner-result; then
            git config user.name "agentfolio[bot]"
            git config user.email "agentfolio[bot]@users.noreply.github.com"
            git add state/learned_rules.md
            if ! git diff --cached --quiet; then
              git commit -m "state: learned rule from human feedback"
              git pull --rebase || true
              git push || true
            fi
          else
            echo "No lesson extracted — nothing to commit"
          fi
          rm -f .learner-result
