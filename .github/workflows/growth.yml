name: Weekly Growth Report

on:
  schedule:
    # Monday 6am UTC
    - cron: '0 6 * * 1'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

env:
  APP_NAME: portfolio

jobs:
  growth:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Install Lighthouse CI
        run: npm install -g @lhci/cli

      - name: Install project dependencies
        run: npm ci

      - name: Fetch GitHub Traffic data
        run: |
          USERNAME=$(node -e "
            const p = JSON.parse(require('fs').readFileSync('content/profile.json'));
            console.log(p.username);
          ")

          REPO_NAME=$(basename $(pwd))
          mkdir -p /tmp/traffic

          # Profile repo traffic (this repo)
          curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${USERNAME}/${REPO_NAME}/traffic/views" \
            > /tmp/traffic/views.json

          curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${USERNAME}/${REPO_NAME}/traffic/referrers" \
            > /tmp/traffic/referrers.json

          curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${USERNAME}/${REPO_NAME}/traffic/clones" \
            > /tmp/traffic/clones.json

          # Stars on this repo
          STARS=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${USERNAME}/${REPO_NAME}" \
            | node -e "const d=JSON.parse(require('fs').readFileSync('/dev/stdin'));console.log(d.stargazers_count)")
          echo "$STARS" > /tmp/traffic/stars.txt

          # All repo stars (for growth report)
          curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/users/${USERNAME}/repos?sort=stars&per_page=10" \
            > /tmp/traffic/top_repos.json

          echo "Traffic data fetched"
          echo "Views: $(cat /tmp/traffic/views.json | node -e "const d=JSON.parse(require('fs').readFileSync('/dev/stdin'));console.log(d.count || 0)")"

      - name: Run Lighthouse CI
        run: |
          SITE_URL=$(node -e "
            const p = JSON.parse(require('fs').readFileSync('content/profile.json'));
            console.log(p.site_url || '');
          ")

          if [ -n "$SITE_URL" ]; then
            lhci collect \
              --url="$SITE_URL" \
              --numberOfRuns=1 \
              --settings.output=json \
              --settings.outputPath=/tmp/lighthouse.json \
              2>/dev/null || echo "Lighthouse run failed, continuing"
          else
            echo "No site_url configured, skipping Lighthouse"
          fi
          echo "Lighthouse complete"

      - name: Build growth prompt
        run: |
          WEEK=$(date -u +"%Y-W%V")
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          cat > /tmp/growth_prompt.txt << PROMPT
          $(cat CLAUDE.md)
          ---
          $(cat apps/${APP_NAME}/CLAUDE.md)
          ---

          ## Current State
          $(cat state/project_state.md)

          ## Growth Goals
          $(cat apps/${APP_NAME}/growth_goals.md)

          ## This Week's Data
          Traffic views: /tmp/traffic/views.json
          Traffic referrers: /tmp/traffic/referrers.json
          Traffic clones: /tmp/traffic/clones.json
          Stars on this repo: $(cat /tmp/traffic/stars.txt 2>/dev/null || echo "0")
          Top repos by stars: /tmp/traffic/top_repos.json
          $([ -f /tmp/lighthouse.json ] && echo "Lighthouse scores: /tmp/lighthouse.json")

          ## Your Tasks for This Week's Growth Run:

          1. UPDATE GROWTH GOALS
             Read growth_goals.md targets.
             Update the "current:" values for:
             - traffic visitors (from views.json total uniques)
             - github stars (from stars.txt)
             - lighthouse scores (from lighthouse.json if available)
             Write updated apps/${APP_NAME}/growth_goals.md

          2. WRITE WEEKLY GROWTH REPORT
             Write state/growth_report.md with:

             # Growth Report — ${WEEK}
             Generated: ${TIMESTAMP}

             ## Traffic (14-day window from GitHub API)
             [visitors, page views, top referrers from data]

             ## Repository
             [stars, clones, top traffic sources]

             ## SEO
             [Lighthouse scores if available, key findings]

             ## vs Goals
             [compare each metric against growth_goals.md targets]
             [flag anything below target as: ⚠ BELOW TARGET]
             [flag anything above target as: ✓ TARGET MET]

             ## Recommended Actions This Week
             [list 2-3 specific actions based on data]
             [prioritize: 1. fix anything below target, 2. content freshness]

             ## Drafts Generated
             [list any draft files written in step 3]

          3. WRITE DISTRIBUTION DRAFTS
             Check content/projects/ — did any projects ship this week?
             (compare last_synced dates and star growth)

             For any project with notable activity:
             - Write state/drafts/${WEEK}-[project-name]-post.md
             - Format:
               ---
               type: social-post
               platform: twitter/x
               project: [name]
               week: ${WEEK}
               ---
               [2-3 sentence post about the project/milestone]
               Include: what it is, why it matters, link

             Also write a weekly summary draft:
             - Write state/drafts/${WEEK}-weekly-summary.md
             - Short paragraph: what shipped, what improved, what's next

          4. SEO MAINTENANCE
             If Lighthouse performance < 90: create GitHub Issue labeled 'agent-ready'
             with specific optimization suggestions from the Lighthouse data.

             Update content/llms.txt if any major profile changes this week.

          5. UPDATE STATE
             Append to state/agent_log.md:
               ${TIMESTAMP} | growth.yml | weekly report | ${WEEK}

             Update state/project_state.md with:
             - This week's growth run completed
             - Key metrics snapshot
             - Drafts written: [list]

             Write .commit-message:
               state: weekly growth report ${WEEK}

               - Traffic: [N] uniques (vs target: [T])
               - Stars: [N] (+[delta] this week)
               - [N] distribution drafts written

          PROMPT

          echo "Growth prompt written"

      - name: Run Claude growth agent
        run: |
          claude -p "$(cat /tmp/growth_prompt.txt)" \
            --allowedTools "bash,read,write,edit" \
            --max-turns 30
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit growth report and updated goals
        run: |
          git config user.name "agentfolio[bot]"
          git config user.email "agentfolio[bot]@users.noreply.github.com"
          git add state/ apps/

          if git diff --staged --quiet; then
            echo "No growth changes to commit"
          else
            COMMIT_MSG=$(cat .commit-message 2>/dev/null || \
              echo "state: weekly growth report $(date -u +%Y-W%V)")
            rm -f .commit-message
            git commit -m "$COMMIT_MSG"
            git push
            echo "Growth report committed"
          fi
