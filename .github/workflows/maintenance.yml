name: Daily Maintenance

on:
  schedule:
    # 3am UTC daily
    - cron: '0 3 * * *'
  workflow_dispatch:

permissions:
  contents: write
  issues: write

env:
  APP_NAME: portfolio

jobs:
  maintain:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Install project dependencies
        run: npm ci

      - name: Install link checker
        run: npm install -g lychee-link-checker || true
        # lychee is a fast link checker written in Rust
        # falls back gracefully if unavailable

      - name: Fetch latest GitHub data
        run: |
          # Read username from profile.json
          USERNAME=$(node -e "
            const p = JSON.parse(require('fs').readFileSync('content/profile.json'));
            console.log(p.username);
          ")

          echo "Fetching data for: $USERNAME"

          # Fetch repos
          curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/users/${USERNAME}/repos?sort=updated&per_page=100" \
            > /tmp/repos_latest.json

          # Fetch user profile (bio might have changed)
          curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/users/${USERNAME}" \
            > /tmp/user_latest.json

          # Check for blog RSS if configured
          BLOG_URL=$(node -e "
            const p = JSON.parse(require('fs').readFileSync('content/profile.json'));
            console.log(p.blog || '');
          ")

          if [ -n "$BLOG_URL" ]; then
            # Try common RSS paths
            curl -s "${BLOG_URL}/feed.xml" > /tmp/blog_rss.xml 2>/dev/null || \
            curl -s "${BLOG_URL}/rss.xml" > /tmp/blog_rss.xml 2>/dev/null || \
            curl -s "${BLOG_URL}/feed" > /tmp/blog_rss.xml 2>/dev/null || true
          fi

          echo "GitHub data refreshed"

      - name: Run link checker
        run: |
          # Build site first to check links in output
          npm run build 2>/dev/null || true

          # Run lychee if available, otherwise use curl-based check
          if command -v lychee &> /dev/null; then
            lychee --format json dist/ > /tmp/link_report.json 2>/dev/null || true
          else
            # Simple link extraction from content/
            grep -r "https\?://[^\"')\s]*" content/ \
              --include="*.md" -h -o \
              | sort -u > /tmp/urls_to_check.txt || true

            # Check each URL
            echo "[]" > /tmp/link_report.json
            while read URL; do
              STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
                --max-time 10 "$URL" 2>/dev/null || echo "000")
              if [[ "$STATUS" == "404" || "$STATUS" == "000" ]]; then
                echo "BROKEN: $URL (status: $STATUS)"
              fi
            done < /tmp/urls_to_check.txt || true
          fi

          echo "Link check complete"

      - name: Build maintenance prompt
        run: |
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          cat > /tmp/maintenance_prompt.txt << PROMPT
          $(cat CLAUDE.md)
          ---
          $(cat apps/${APP_NAME}/CLAUDE.md)
          ---

          ## Current State
          $(cat state/project_state.md)

          ## Today's Data
          Latest GitHub repos: /tmp/repos_latest.json
          Latest user profile: /tmp/user_latest.json
          $([ -f /tmp/blog_rss.xml ] && echo "Blog RSS: /tmp/blog_rss.xml")
          $([ -f /tmp/link_report.json ] && echo "Link report: /tmp/link_report.json")

          ## Your Tasks for Today's Maintenance Run:

          1. SYNC PROJECT CONTENT
             - Read /tmp/repos_latest.json
             - For each repo in content/projects/:
               * Update stars count if changed
               * Update description if changed in GitHub
               * Update last_synced date to today
             - For any NEW repos not in content/projects/:
               * Create a new .md file with all fields
               * Set featured: false (owner decides featured)
               * Set agent_written: true

          2. SYNC PROFILE
             - Read /tmp/user_latest.json
             - Update content/profile.json if bio, location changed
             - Recalculate skills from latest repos data
             - Update last_updated timestamp

          3. SYNC BLOG POSTS (if /tmp/blog_rss.xml exists)
             - Parse RSS feed
             - Add any new posts to content/posts/
             - Remove posts older than 1 year from content/posts/

          4. HANDLE BROKEN LINKS
             - Read /tmp/link_report.json or broken links output
             - For each broken link:
               * If it's a GitHub repo that was deleted: update project status to 'archived'
               * If it's a dead external URL: remove or replace with working URL
               * If you can fix it: fix it directly
               * If you cannot: create a GitHub Issue labeled 'agent-ready'

          5. GARBAGE COLLECTION
             - Read apps/${APP_NAME}/FEATURE_STATUS.md
             - Check: are there any [ ] items that look fixable today?
             - If yes, create GitHub Issues labeled 'agent-ready' for each
             - Check: any content/projects/ files for repos that no longer exist?
             - If yes: update their status to 'archived'

          6. UPDATE STATE
             - Write updated state/project_state.md with today's summary
             - Append to state/agent_log.md:
               ${TIMESTAMP} | maintenance.yml | daily run | [brief outcome]
             - Write .commit-message:
               chore(sync): daily maintenance ${TIMESTAMP}

               - Synced [N] project descriptions
               - Updated [N] star counts
               - Fixed [N] broken links
               - Created [N] issues for follow-up

          IMPORTANT:
          - If you open GitHub Issues, use: gh issue create --label "agent-ready" --title "..." --body "..."
          - Commit message goes in .commit-message file (workflow commits for you)
          - Do not commit yourself — the workflow handles git
          PROMPT

          echo "Maintenance prompt written"

      - name: Run Claude maintenance agent
        run: |
          claude -p "$(cat /tmp/maintenance_prompt.txt)" \
            --allowedTools "bash,read,write,edit" \
            --max-turns 40
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit all changes
        run: |
          git config user.name "agentfolio[bot]"
          git config user.email "agentfolio[bot]@users.noreply.github.com"

          # Rebuild llms.txt from updated profile
          cp content/llms.txt public/llms.txt 2>/dev/null || true

          git add .
          rm -f .commit-message

          if git diff --staged --quiet; then
            echo "No changes from maintenance run"
          else
            COMMIT_MSG=$(cat .commit-message 2>/dev/null || \
              echo "chore(sync): daily maintenance $(date -u +%Y-%m-%d)")
            git commit -m "$COMMIT_MSG"
            git push
            echo "Maintenance changes committed"
          fi
