name: Onboard

on:
  workflow_dispatch:
    inputs:
      github_username:
        description: 'Your GitHub username'
        required: true
      blog_rss_url:
        description: 'Blog RSS feed URL (optional)'
        required: false
        default: ''
      site_url:
        description: 'Your custom domain (optional, e.g. https://lee.dev)'
        required: false
        default: ''

permissions:
  contents: write

env:
  APP_NAME: portfolio

jobs:
  onboard:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Fetch GitHub profile data
        id: github_data
        run: |
          USERNAME="${{ inputs.github_username }}"

          # Fetch user profile
          curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/users/${USERNAME}" \
            > /tmp/user_profile.json

          # Fetch all public repos (sorted by last updated)
          curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/users/${USERNAME}/repos?sort=updated&per_page=100" \
            > /tmp/user_repos.json

          # Fetch top 10 repo READMEs for richer descriptions
          TOP_REPOS=$(cat /tmp/user_repos.json | \
            node -e "
              const repos = JSON.parse(require('fs').readFileSync('/dev/stdin','utf8'));
              const top = repos
                .filter(r => !r.fork)
                .sort((a,b) => b.stargazers_count - a.stargazers_count)
                .slice(0, 10)
                .map(r => r.name);
              console.log(top.join(' '));
            ")

          mkdir -p /tmp/readmes
          for REPO in $TOP_REPOS; do
            curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
              "https://api.github.com/repos/${USERNAME}/${REPO}/readme" \
              > /tmp/readmes/${REPO}.json 2>/dev/null || true
          done

          echo "GitHub data fetched for ${USERNAME}"

      - name: Fetch blog RSS if provided
        if: inputs.blog_rss_url != ''
        run: |
          curl -s "${{ inputs.blog_rss_url }}" > /tmp/blog_rss.xml || echo "RSS fetch failed, continuing"

      - name: Build onboard prompt
        run: |
          USERNAME="${{ inputs.github_username }}"
          BLOG_RSS="${{ inputs.blog_rss_url }}"
          SITE_URL="${{ inputs.site_url }}"

          # If no custom site URL, use GitHub Pages URL
          if [ -z "$SITE_URL" ]; then
            SITE_URL="https://${USERNAME}.github.io/$(basename $(pwd))"
          fi

          cat > /tmp/onboard_prompt.txt << PROMPT
          You are initializing the Agentfolio scaffold for a new user.
          Read the root CLAUDE.md for harness rules.

          User's GitHub username: ${USERNAME}
          Site URL: ${SITE_URL}

          ## Data available to you
          - /tmp/user_profile.json — GitHub user profile (bio, location, blog, etc.)
          - /tmp/user_repos.json — all public repos (name, description, stars, language, topics)
          - /tmp/readmes/ — README content for top repos (base64 encoded, decode with base64 -d)
          $([ -f /tmp/blog_rss.xml ] && echo "- /tmp/blog_rss.xml — blog RSS feed")

          ## Your tasks (complete all of them):

          1. Write content/profile.json
             - Populate all fields from GitHub profile data
             - Infer skills from top languages across repos (aggregate by bytes)
             - Set site_url to: ${SITE_URL}
             - Set last_updated to current ISO timestamp
             - Set updated_by to "agent"

          2. Write content/projects/ — one .md file per non-fork repo
             - Filename: {repo-name}.md
             - Use the schema from src/content.config.ts
             - Write a 1-sentence description from repo description or README summary
             - Write longDescription (2-3 sentences) from README if available
             - Set featured: true for the top 3 repos by stars
             - Set agent_written: true, last_synced: today's date

          3. Write content/llms.txt
             - Populate all (set by onboard) placeholders with real data
             - Name, role, projects list, expertise from profile + repos

          $([ -f /tmp/blog_rss.xml ] && echo "4. Write content/posts/ from RSS feed
             - Parse /tmp/blog_rss.xml
             - Create one .md per post (up to 20 most recent)
             - Use posts schema from src/content.config.ts")

          5. Write apps/portfolio/CLAUDE.md
             - Replace all (set by onboard.yml) placeholders with real values
             - Owner: ${USERNAME}, GitHub: https://github.com/${USERNAME}
             - Live URL: ${SITE_URL}
             - Keep all rules intact, just fill in the placeholders

          6. Write apps/portfolio/growth_goals.md
             - Keep targets as-is (user can adjust)
             - Just update the notes with the user's name

          7. Write state/project_state.md
             - Record: onboard.yml completed successfully
             - List what was created
             - Next agent: deploy.yml will fire on commit

          8. Write .commit-message with content:
             feat: initial profile for ${USERNAME} via onboard.yml

             - [N] projects synced from GitHub
             - profile.json, llms.txt populated
             - apps/portfolio/CLAUDE.md initialized
             - Ready for first deploy

          IMPORTANT: Write all files. Do not skip any.
          Use bash to decode base64 READMEs: base64 -d <<< "$encoded_content"
          PROMPT

          echo "Onboard prompt written"

      - name: Run Claude onboard agent
        run: |
          claude -p "$(cat /tmp/onboard_prompt.txt)" \
            --allowedTools "bash,read,write,edit" \
            --max-turns 40
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Commit all generated content
        run: |
          git config user.name "agentfolio[bot]"
          git config user.email "agentfolio[bot]@users.noreply.github.com"
          git add .

          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            COMMIT_MSG=$(cat .commit-message 2>/dev/null || echo "feat: onboard complete for ${{ inputs.github_username }}")
            git commit -m "$COMMIT_MSG"
            git push
            echo "Committed and pushed. deploy.yml will fire automatically."
          fi
