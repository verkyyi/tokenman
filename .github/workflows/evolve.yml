name: Self-Evolve

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write
  actions: write

env:
  APP_NAME: scaffold

jobs:
  evolve:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 50

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Build evolution prompt
        run: |
          cat > /tmp/prompt.txt << 'PROMPT'
          You are the self-evolution agent for Agentfolio. You MUST execute
          bash commands to fetch data, write files, and make changes.
          Do NOT just reason about what to do — actually do it.

          ## STEP 1: Research (REQUIRED — always execute these commands)

          Run these curl commands and capture the output:

          ```bash
          TIMESTAMP=$(date -u +%Y-%m-%dT%H:%M:%SZ)

          # Fetch reference repo commits
          REPO1=$(curl -s "https://api.github.com/repos/godagoo/claude-code-always-on/commits?per_page=3" | head -c 500)
          REPO2=$(curl -s "https://api.github.com/repos/humanlayer/humanlayer/commits?per_page=3" | head -c 500)
          ACTIONS=$(curl -s "https://api.github.com/repos/actions/runner/releases?per_page=2" | head -c 500)
          ```

          Then append findings to state/research_log.md. For each source,
          add ONE line in this exact format:
          TIMESTAMP | source-name | one-line summary of what you found | action taken or "no action"

          Example:
          2026-03-20T03:00:00Z | humanlayer/humanlayer | no new commits in past week | no action
          2026-03-20T03:00:00Z | actions/runner | v2.322.0 released with node24 support | noted for future update

          ## STEP 2: Analyze

          Read these files and look for issues:
          - state/agent_log.md — any patterns or repeated failures?
          - state/project_state.md — current priorities
          - CLAUDE.md — check failure log section for entries starting with "# 20"
          - git log --oneline -20 — recent changes
          - ls apps/ — any folders without CLAUDE.md?

          ## STEP 3: Log this run

          ALWAYS append a line to state/agent_log.md:
          TIMESTAMP | evolve.yml | self-evolution run | summary of what you found and did

          ## STEP 4: Update project state

          Write a brief session summary to state/project_state.md covering
          what you analyzed and any findings.

          ## STEP 5: Act on findings (if any)

          For safe changes (failure log entries, skill wording fixes):
          - Write them directly to the files

          For structural changes (workflow fixes, new rules, new skills):
          - Write a file called .proposed-change.md with:
            - Line 1: # Title of the change
            - Rest: what to change, why, and which files
          - Maximum ONE .proposed-change.md per run

          For new apps/ folders without CLAUDE.md:
          - Write the folder name to .trigger-discovery.txt

          ## Rules
          - You CANNOT promote your own autonomy
          - You CANNOT modify workflow YAML directly (propose via .proposed-change.md only)
          - You MUST execute the curl commands in Step 1
          - You MUST write to state/agent_log.md in Step 3
          - You MUST update state/project_state.md in Step 4

          ## Context
          $(cat CLAUDE.md)
          $(cat apps/scaffold/CLAUDE.md)

          ## Current State
          $(cat state/project_state.md)

          ## Recent Agent Log (last 20 lines)
          $(tail -20 state/agent_log.md)

          ## Failure Log
          $(grep "^# [0-9]" CLAUDE.md | tail -20)
          PROMPT

      - name: Run Claude Code
        run: |
          claude -p "$(cat /tmp/prompt.txt)" \
            --allowedTools "bash,read,write,edit,glob,grep" \
            --max-turns 30
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

      - name: Setup git config
        run: |
          git config user.name "agentfolio[bot]"
          git config user.email "agentfolio[bot]@users.noreply.github.com"

      - name: Auto-commit safe changes
        run: |
          git add state/ CLAUDE.md skills/
          git diff --cached --quiet || git commit -m "state: evolve.yml — $(date -u +%Y-%m-%d)"
          git push || true

      - name: Trigger discovery if needed
        if: hashFiles('.trigger-discovery.txt') != ''
        run: |
          APP=$(cat .trigger-discovery.txt)
          gh workflow run discover.yml -f app_name="$APP"
          rm .trigger-discovery.txt
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Create structural PR if proposed
        if: hashFiles('.proposed-change.md') != ''
        run: |
          BRANCH="evolve/$(date +%Y%m%d-%H%M%S)"
          git checkout -b "$BRANCH"
          git add -A
          TITLE=$(head -1 .proposed-change.md | sed 's/^# //')
          BODY=$(cat .proposed-change.md)
          rm .proposed-change.md
          git commit -m "feat(harness): $TITLE"
          git push -u origin "$BRANCH"
          gh pr create \
            --title "$TITLE" \
            --body "$BODY" \
            --label "needs-review"
        env:
          GH_TOKEN: ${{ github.token }}
